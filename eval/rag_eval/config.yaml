env_path: "eval/.env"

defaults:
  question_set_path: "eval/rag_eval/dataset/sheet1_questions.json"
  dataset_conversion_input: "D:/STUDY MO/Research/Data/Q&A.xlsx"
  dataset_name: "AIGC-EDU-test"
  qa_mode: "agent"
  answer_model: "deepseek"
  judge_model: "qwen"
  main_config_path: "config/base_config.yaml"
  results_dir: "eval/results/rag_eval"
  prompt_path: "eval/rag_eval/prompts/judge_prompt.txt"
  max_samples:
  concurrency: 10
  save_raw_context: true
  prediction_cache: true

runtime:
  retry_policy:
    answer_max_attempts: 2
    judge_max_attempts: 2

models:
  deepseek:
    provider: "openai"
    model_env: "DEEPSEEK_MODEL"
    base_url_env: "DEEPSEEK_BASE_URL"
    api_key_env: "DEEPSEEK_API_KEY"
  qwen:
    provider: "openai"
    model_env: "QWEN_MODEL"
    base_url_env: "QWEN_BASE_URL"
    api_key_env: "QWEN_API_KEY"

roles:
  answer:
    temperature: 0.3
    timeout_seconds: 120
  judge:
    temperature: 0.0
    timeout_seconds: 120

evaluation:
  dimensions:
    accuracy:
      weight: 0.2
      description: "事实客观真实性：检验回答与参考答案及检索证据的一致性，严格检测幻觉与事实错误"
    completeness:
      weight: 0.2
      description: "信息覆盖广度：评估答案是否详尽囊括参考答案中的核心要素与关键视点"
    logic:
      weight: 0.2
      description: "论证链路自洽：审查因果推导是否严密、前后呼应、结构清晰且具说服力"
    explainability:
      weight: 0.2
      description: "证据溯源透明度：评估答案是否提供了详实的信息依据与明确的推理链路映射"
    interdisciplinarity:
      weight: 0.2
      description: "跨域知识融合：检验解答能否有效整合不同学科视阈，实现知识要素的跨域关联与深度印证"
