env_path: "eval/.env"

defaults:
  question_set_path: "eval/rag_eval/dataset/sheet1_questions.json"
  dataset_conversion_input: "D:/STUDY MO/Research/Data/Q&A.xlsx"
  dataset_name: "AIGC-EDU-test"
  qa_mode: "agent"
  answer_model: "deepseek"
  judge_model: "qwen"
  main_config_path: "config/base_config.yaml"
  results_dir: "eval/results/rag_eval"
  prompt_path: "eval/rag_eval/prompts/judge_prompt.txt"
  max_samples:
  concurrency: 1
  save_raw_context: true

runtime:
  retry_policy:
    answer_max_attempts: 2
    judge_max_attempts: 2

models:
  deepseek:
    provider: "openai"
    model_env: "DEEPSEEK_MODEL"
    base_url_env: "DEEPSEEK_BASE_URL"
    api_key_env: "DEEPSEEK_API_KEY"
  qwen:
    provider: "openai"
    model_env: "QWEN_MODEL"
    base_url_env: "QWEN_BASE_URL"
    api_key_env: "QWEN_API_KEY"

roles:
  answer:
    temperature: 0.3
    timeout_seconds: 120
  judge:
    temperature: 0.0
    timeout_seconds: 120

evaluation:
  dimensions:
    accuracy:
      weight: 0.2
      description: "是否与参考答案和检索证据一致，是否存在事实性错误或明显幻觉"
    completeness:
      weight: 0.2
      description: "是否覆盖问题所需关键点，是否遗漏核心要素"
    logic:
      weight: 0.2
      description: "回答是否结构清晰、推理自洽、前后不矛盾"
    explainability:
      weight: 0.2
      description: "是否说明依据、理由或证据，让读者能理解答案为何成立"
    interdisciplinarity:
      weight: 0.2
      description: "是否体现跨学科关联、比较、迁移、融合或多视角整合"
