env_path: "eval/.env"

defaults:
  dataset_name: "AIGC-EDU"
  sample_path: "eval/kg_eval/dataset/AIGC-EDU-kgval.gold.json"
  main_config_path: "config/base_config.yaml"
  results_dir: "eval/results/kg_eval"
  cross_doc_review_sample_size: 50
  cross_doc_review_seed: 42
  paper_node_top_k: 5
  gold_triple_top_k: 10
  gold_model: "qwen"
  candidate_model: "gemini"
  eval_max_workers: 18  # 并行评估线程数，根据 API 并发限制调整

models:
  deepseek:
    provider: "openai"
    model_env: "DEEPSEEK_MODEL"
    base_url_env: "DEEPSEEK_BASE_URL"
    api_key_env: "DEEPSEEK_API_KEY"
  qwen:
    provider: "openai"
    model_env: "QWEN_MODEL"
    base_url_env: "QWEN_BASE_URL"
    api_key_env: "QWEN_API_KEY"
  qwen3.5plus:
    provider: "openai"
    model_env: "QWEN35P_MODEL"
    base_url_env: "QWEN_BASE_URL"
    api_key_env: "QWEN_API_KEY"
  glm:
    provider: "openai"
    model_env: "GLM_MODEL"
    base_url_env: "GLM_BASE_URL"
    api_key_env: "GLM_API_KEY"
  doubao:
    provider: "openai"
    model_env: "DOUBAO_MODEL"
    base_url_env: "DOUBAO_BASE_URL"
    api_key_env: "DOUBAO_API_KEY"
  kimi2.5:
    provider: "openai"
    model_env: "DOUBAO_KIMI_MODEL"
    base_url_env: "DOUBAO_BASE_URL"
    api_key_env: "DOUBAO_API_KEY"
  glm4.7:
    provider: "openai"
    model_env: "DOUBAO_GLM_MODEL"
    base_url_env: "DOUBAO_BASE_URL"
    api_key_env: "DOUBAO_API_KEY"
  deepseekv3.2:
    provider: "openai"
    model_env: "DOUBAO_DS_MODEL"
    base_url_env: "DOUBAO_BASE_URL"
    api_key_env: "DOUBAO_API_KEY"
  doubaolite:
    provider: "openai"
    model_env: "DOUBAO_LITE_MODEL"
    base_url_env: "DOUBAO_BASE_URL"
    api_key_env: "DOUBAO_API_KEY"
  minimax2.5:
    provider: "openai"
    model_env: "DOUBAO_MINIMAX_MODEL"
    base_url_env: "DOUBAO_BASE_URL"
    api_key_env: "DOUBAO_API_KEY"
  gemini:
    provider: "openai"
    model_env: "GEMINI_MODEL"
    base_url_env: "GEMINI_BASE_URL"
    api_key_env: "GEMINI_API_KEY"


roles:
  gold:
    temperature: 0.0
    timeout_seconds: 120
  candidate:
    temperature: 0.0
    timeout_seconds: 120
