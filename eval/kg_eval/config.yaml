env_path: "eval/.env"

defaults:
  dataset_name: "AIGC-EDU"
  sample_path: "eval/kg_eval/dataset/AIGC-EDU-kgval.gold.json"
  main_config_path: "config/base_config.yaml"
  results_dir: "eval/results/kg_eval"
  cross_doc_review_sample_size: 50
  cross_doc_review_seed: 42
  paper_node_top_k: 5
  gold_triple_top_k: 10
  gold_model: "deepseek"
  candidate_model: "qwen"

models:
  deepseek:
    provider: "openai"
    model_env: "DEEPSEEK_MODEL"
    base_url_env: "DEEPSEEK_BASE_URL"
    api_key_env: "DEEPSEEK_API_KEY"
  qwen:
    provider: "openai"
    model_env: "QWEN_MODEL"
    base_url_env: "QWEN_BASE_URL"
    api_key_env: "QWEN_API_KEY"
  glm:
    provider: "openai"
    model_env: "GLM_MODEL"
    base_url_env: "GLM_BASE_URL"
    api_key_env: "GLM_API_KEY"

roles:
  gold:
    temperature: 0.0
    timeout_seconds: 120
  candidate:
    temperature: 0.0
    timeout_seconds: 120
