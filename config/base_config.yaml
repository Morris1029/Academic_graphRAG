construction:
  chunk_size: 1000
  cross_doc_enabled: false  #跨文档抽边 有点慢先不用
  bridge_min_confidence: 0.75
  bridge_enable_fallback: false
  bridge_max_edges_per_paper: 2
  batch_size_docs: 48
  token_budget_per_batch: 24000
  bridge_relations:
    # 扩展、对比、复用
    - "扩展"
    - "对比"
    - "复用"
  prompt_version: v1
  datasets_no_chunk:
    - demo
  max_workers: 18
  max_concurrent_llm_requests: 30
  requests_per_minute: 720
  tokens_per_minute_budget: 0
  llm_timeout_seconds: 90
  retry_attempts: 3
  retry_backoff_base_seconds: 2
  retry_backoff_max_seconds: 20
  resume_enabled: true
  replay_cached_extractions: true
  extraction_cache_dir: output/construction_cache
  mode: agent  # set noagent to speed up
  overlap: 200
  tree_comm:
    embedding_model: all-MiniLM-L6-v2
    enable_fast_mode: true
    struct_weight: 0.3
    max_total_communities: 100
    triple_text_max_chars: 360
    max_triples_per_node: 8
    llm_batch_size: 8
    max_concurrent_llm_requests: 10
    requests_per_minute: 400

active_dataset: demo

datasets:
  demo:
    corpus_path: data/demo/demo_corpus.json
    qa_path: data/demo/demo.json
    schema_path: schemas/demo.json
    graph_output: output/graphs/demo_new.json

embeddings:
  batch_size: 32
  device: cpu
  max_length: 512
  model_name: all-MiniLM-L6-v2
  text_max_chars: 480
  chunk_text_max_chars: 480

nlp:
  spacy_model: zh_core_web_lg

output:
  base_dir: output
  chunks_dir: output/chunks
  graphs_dir: output/graphs
  logs_dir: output/logs
  save_chunk_details: true
  save_intermediate_results: true

performance:
  batch_size: 16
  max_workers: 32
  memory_optimization: true
  parallel_processing: true

prompts:
  construction:
    # NoAgent mode prompts
    general: |
      你是一个专业的学术文献分析专家。你的任务是从论文元数据中提取实体（Entity）和三元组（Relation）。

      请严格将实体类型映射到以下 Schema，不得自行创造新类型：
      ```{schema}```

      【提取准则】
      1. 核心实体：
         - “论文”：必须提取，作为中心节点。
         - “作者”：提取前 3 位作者。
         - “机构”：只提取一级机构名称。
         - “技术 / 研究方法 / 研究主题 / 教学场景 / 教育领域 / 期刊”：按 Schema 就近映射。
      2. 关系标准化：
         - 只使用 Schema 中已有关系，如“撰写 / 隶属 / 发表于 / 应用于 / 聚焦 / 采用 / 提出”。
      3. 去噪：
         - 不要抽取过于泛化的词，如“人工智能”“研究”“方法”等。
         - 不要输出循环关系，三元组两端实体不能相同。
      4. 属性：
         - 仅保留关键属性，如年份、来源、关键词、定义。

      【输入内容】
      ```{chunk}```

      请仅返回 JSON，包含以下字段：
      - "attributes"
      - "triples"
      - "entity_types"
      - "new_schema_types"（固定返回空结构，不新增 schema）

    # Agent mode prompts
    general_agent: |
      你是一个专业的学术文献分析专家。你的任务是从论文元数据中提取实体（Entity）和三元组（Relation）。

      你必须严格遵守以下 Schema，不得新增节点类型、关系类型或属性类型：
      ```{schema}```

      【抽取规则】
      1. 实体命名必须具体、简洁，优先使用专有名词。
      2. 实体类型必须映射到现有 Schema；若文本中出现“教学模式、研究理论、教育理念、人才培养模式”等概念，请映射到最接近的既有类型，而不是创建新类型。
      3. 关系必须使用 Schema 中已有关系。
      4. 属性只保留关键短语，不得整段复制摘要。
      5. 作者仅保留前 3 位，机构仅保留一级机构名称。

      【输入内容】
      {chunk}

      【输出格式】
      必须且仅返回 JSON，包含：
      - "attributes": {{实体名: [属性1, 属性2]}}
      - "triples": [[实体1, 关系, 实体2], ...]
      - "entity_types": {{实体名: 类型}}
      - "new_schema_types": {{"nodes": [], "relations": [], "attributes": []}}

  decomposition:
    general: |
      你是一个学术问题拆解助手。请将用户问题拆解成适合知识图谱检索的子问题，并识别涉及的 schema 类型。

      图谱 Schema：
      {ontology}

      【拆解原则】
      1. 如果问题是简单事实题，只返回 1 个子问题。
      2. 如果问题涉及比较、综述、发展脉络，再拆成多个子问题。
      3. 子问题必须尽量贴近图谱能回答的事实关系，例如：
         - 谁撰写了某篇论文
         - 某论文提出了什么方法或框架
         - 某论文发表于什么期刊
         - 某论文聚焦什么研究主题、教育领域或教学场景
      4. involved_types 只填写最可能涉及的节点类型与关系类型。

      问题：{question}

      请仅返回 JSON：
      {{
        "sub_questions": [
          {{"sub-question": "子问题 1"}}
        ],
        "involved_types": {{
          "nodes": ["相关节点类型"],
          "relations": ["相关关系类型"]
        }}
      }}

  retrieval:
    general: |
      你是一个严谨的学术科研助手。请根据提供的【检索上下文】回答用户问题。

      【检索上下文】：
      {context}

      【回答要求】
      1. 事实类问题优先使用结构化 Triples 作为证据。
      2. 每个关键结论后追加【证据: ...】。
      3. 如果上下文不足，明确回答“现有资料不足以回答”，不要编造。
      4. 先给直接答案，再补一句简短说明；若是综述类问题可用列表。
      5. 区分“上下文事实”和“你的总结”，不要把推断当作事实。

      【用户问题】：
      {question}

      【回答】：

retrieval:
  agent:
    enable_ircot: false
    enable_parallel_subquestions: false
    max_steps: 1
  cache_dir: retriever/faiss_cache_new
  enable_caching: true
  enable_diagnostics: true
  enable_high_recall: true
  enable_query_enhancement: true
  enable_reranking: true
  faiss:
    device: cpu
    max_workers: 4
    search_k: 50
  recall_paths: 2
  similarity_threshold: 0.3
  top_k: 20
  top_k_filter: 20
  weak_relation_penalty: 0.2

triggers:
  constructor_trigger: true
  mode: agent  # set noagent to speed up
  retrieve_trigger: true
