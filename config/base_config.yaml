construction:
  chunk_size: 1000
  cross_doc_enabled: false  #跨文档抽边 有点慢先不用
  bridge_min_confidence: 0.75
  bridge_enable_fallback: false
  bridge_max_edges_per_paper: 2
  batch_size_docs: 12
  token_budget_per_batch: 24000
  bridge_relations:
    # 扩展、对比、复用
    - "扩展"
    - "对比"
    - "复用"
  prompt_version: v1
  datasets_no_chunk:
    - demo
  max_workers: 18
  max_concurrent_llm_requests: 18
  requests_per_minute: 720
  tokens_per_minute_budget: 0
  llm_timeout_seconds: 240
  retry_attempts: 3
  retry_backoff_base_seconds: 2
  retry_backoff_max_seconds: 20
  resume_enabled: true
  replay_cached_extractions: true
  extraction_cache_dir: output/construction_cache
  mode: agent  # set noagent to speed up
  overlap: 200
  tree_comm:
    embedding_model: BAAI/bge-small-zh-v1.5
    enable_fast_mode: true
    struct_weight: 0.3
    max_total_communities: 100
    triple_text_max_chars: 360
    max_triples_per_node: 8
    llm_batch_size: 8
    max_concurrent_llm_requests: 10
    requests_per_minute: 400

active_dataset: demo

datasets:
  demo:
    corpus_path: data/demo/demo_corpus.json
    qa_path: data/demo/demo.json
    schema_path: schemas/demo.json
    graph_output: output/graphs/demo_new.json
    
  AIGC-EDU-test:
    corpus_path: data/uploaded/AIGC-EDU-test/AIGC-EDU-test.json
    qa_path: data/uploaded/AIGC-EDU-test/AIGC-EDU-test.json
    schema_path: schemas/demo.json
    graph_output: output/graphs/AIGC-EDU-test_new.json

embeddings:
  batch_size: 32
  device: cpu
  max_length: 512
  model_name: BAAI/bge-small-zh-v1.5
  embedding_dim: 512
  text_max_chars: 480
  chunk_text_max_chars: 480

nlp:
  spacy_model: zh_core_web_lg

output:
  base_dir: output
  chunks_dir: output/chunks
  graphs_dir: output/graphs
  logs_dir: output/logs
  save_chunk_details: true
  save_intermediate_results: true

performance:
  batch_size: 16
  max_workers: 32
  memory_optimization: true
  parallel_processing: true

prompts:
  construction:
    # NoAgent mode prompts
    general: |
      你是一个专业的学术文献分析专家。你的任务是从论文元数据中提取实体（Entity）和三元组（Relation）。

      请严格将实体类型映射到以下 Schema，不得自行创造新类型：
      ```{schema}```

      【提取准则】
      1. 核心实体：
         - “论文”：必须提取，作为中心节点。
         - “作者”：提取前 3 位作者。
         - “机构”：只提取一级机构名称。
         - “技术 / 研究方法 / 研究主题 / 教学场景 / 教育领域 / 期刊”：按 Schema 就近映射。
      2. 关系标准化与方向性约束：
         - 只使用 Schema 中已有关系。
         - 必须严格遵守关系的方向性（头实体 -> 关系 -> 尾实体），例如：
           * (论文, 采用, 研究方法/技术)
           * (论文, 提出/聚焦, 研究主题)
           * (技术/研究方法, 应用于, 教学场景/教育领域)
         - 绝对不能反方向抽取！例如：绝不能输出 (研究方法, 采用, 论文)。
      3. 去噪：
         - 不要抽取过于泛化的词，如“人工智能”“研究”“方法”等。
         - 不要输出循环关系，三元组两端实体不能相同。
      4. 属性：
         - 仅保留关键属性，如年份、来源、关键词、定义。

      【输入内容】
      ```{chunk}```

      请仅返回 JSON，包含以下字段：
      - "attributes"
      - "triples"
      - "entity_types"
      - "new_schema_types"（固定返回空结构，不新增 schema）

    # Agent mode prompts
    general_agent: |
      你是一个专业的学术文献分析专家。你的任务是从论文标题与摘文本中提取实体（Entity）和三元组（Relation）。

      你必须严格遵守以下 Schema，不得新增节点类型、关系类型或属性类型：
      ```{schema}```

      【抽取规则】
      1. 实体命名必须具体、简洁，优先使用专有名词。
      2. 实体类型必须映射到现有 Schema；若文本中出现“教学模式、研究理论、教育理念、人才培养模式”等概念，请映射到最接近的既有类型，而不是创建新类型。
      3. 关系必须使用 Schema 中已有关系，并且【严格遵守关系的方向性】！
         - 正确方向示例：(论文, 采用, 研究方法)、(论文, 聚焦, 研究主题)、(技术, 应用于, 场景)。
         - 严禁关系反转：绝不能输出 (场景, 应用于, 技术) 或 (研究方法, 采用, 论文) 等违反常理的错误方向。
      4. 属性只保留关键短语，不得整段复制摘要。
      5. 作者、机构、期刊、关键词等节点，已经使用脚本提取，不要重复提取。

      【少样本示例】
      输入：
      文献标题: 基于生成式人工智能的大学生编程学习行为分析研究
      摘要: 研究分析36位学习者如何利用ChatGPT进行编程学习。结果显示学习者高度依赖其指导，通过复制反馈快速解决问题。高绩效组侧重前期辅助，中低绩效组则表现出更强的持续依赖。

      输出：
      {{
        "entity_types": {{
          "基于生成式人工智能的大学生编程学习行为分析研究": "论文",
          "ChatGPT": "技术",
          "编程学习": "教学场景",
          "实证研究": "研究方法"
        }},
        "attributes": {{
          "ChatGPT": ["定义: 由 OpenAI 开发的一款人工智能聊天机器人"],
          "实证研究": ["定义: 通过观察和实验收集数据来验证假设的研究方法"]
        }},
        "triples": [
          ["ChatGPT", "应用于", "编程学习"],
          ["基于生成式人工智能的大学生编程学习行为分析研究", "聚焦", "编程学习"],
          ["基于生成式人工智能的大学生编程学习行为分析研究", "采用", "实证研究"]
        ],
        "new_schema_types": {{"nodes": [], "relations": [], "attributes": []}}
      }}

      【正式提取】
      输入内容：
      {chunk}

      【输出格式】
      必须且仅返回 JSON，包含：
      - "attributes": {{实体名: [属性1, 属性2]}}
      - "triples": [[实体1, 关系, 实体2], ...]
      - "entity_types": {{实体名: 类型}}
      - "new_schema_types": {{"nodes": [], "relations": [], "attributes": []}}

  decomposition:
    general: |
      你是一个面向跨学科知识图谱检索（GraphRAG）的高级学术问题拆解专家。请将用户输入的复杂学术问题，拆解为适合图谱多路协同召回（三元组精确匹配、实体与关系检索、文本块检索）的结构化子问题，并精准识别涉及的 Schema 类型。

      图谱 Schema：
      {ontology}

      【拆解原则与逻辑】

      ▌原则一：意图识别与认知维度判断
      首先判断问题的认知维度，严禁将高阶逻辑问题退化为单纯的事实实体检索：
      - 对比分析型：问"异同""区别""差异""侧重点"
      - 归因解释型：问"为什么""原因""何以""动因"
      - 结构归纳型：问"哪些维度""哪些方向""构建体系""应用场景"
      - 跨文档推理型：需综合多个独立文献论证才能回答
      - 全局总结型：问"总体态势""主流共识""演进特征""整体影响"

      ▌原则二：兼容双路协同检索
      子问题需同时兼顾两种检索粒度：
      - 细粒度锚点：包含具体概念、实体或属性关键词（触发三元组精确匹配与原文切片召回）
      - 宏观语义锚点：包含领域结构、演进脉络或框架性表述（触发图谱高层级语义聚类）
      子问题句式建议："哪些研究探讨了……""现有文献如何论述……""……的核心机制/应用特征是什么"

      ▌原则三：按题型差异化拆解（含典型示例）
      A. 对比分析型 → 按比较对象逐一拆分，最后可加"差异归因"子问题
         示例：问"基础教育与高等教育的AI应用有何不同"
         → 哪些研究探讨了生成式AI在基础教育中的应用特征与侧重点？
         → 哪些研究探讨了生成式AI在高等教育中的应用特征与侧重点？

      B. 归因解释型 → 按因果层次拆分（现象层→机理层→理论依据层）
         示例：问"为什么提示词工程被视为智能时代的核心能力"
         → 哪些研究讨论了提示词工程对AI辅助学习效果的影响机制？
         → 现有文献如何从认知理论视角论证提示素养的学习价值？

      C. 结构归纳型 → 按维度或子领域拆分，确保要素覆盖完备性
         示例：问"AI赋能教育评价体系的改革方向有哪些"
         → 哪些研究提出了教育评价目标从结果导向向素养导向的转变？
         → 哪些研究探讨了人机协同评价方式与智能评测工具的创新路径？

      D. 跨文档推理型 → 按论证单元拆分，每个子问题聚焦独立视角，引导跨文献证据融合
         → 子问题应覆盖不同学科、不同论证视角，以召回可整合的多段证据

      E. 全局总结型 → 按子主题或学科视角拆分，确保宏观覆盖广度
         → 子问题应指向领域整体态势、主要争论焦点、代表性研究框架

      ▌原则四：数量与精度控制
      - 子问题数量控制在 2~5 个，不超过 5 个
      - 每个子问题语义完整，可独立触发检索，禁止过度碎片化

      ▌原则五：类型精准映射
      involved_types 必须严格贴合给定 Schema 与学术语境，关系类型优先使用 Schema 中已有关系。

      用户问题：{question}

      请仔细思考分析过程，但最终仅返回符合以下格式的严格 JSON（严禁输出其他解释性文本）：
      {{
        "question_type": "识别问题的认知维度（对比分析型/归因解释型/结构归纳型/跨文档推理型/全局总结型）",
        "sub_questions": [
          {{
            "sub-question": "子问题具体表述（语义完整，适合文本块检索）",
            "retrieval_target": "该子问题的检索锚点（细粒度实体抽取 / 多跳逻辑路径 / 宏观语义聚类）"
          }}
        ],
        "involved_types": {{
          "nodes": ["相关节点类型"],
          "relations": ["相关关系类型"]
        }}
      }}


  retrieval:
    general: |
      你是一位严谨的跨学科学术科研助手。请根据提供的【检索上下文】综合回答用户的学术问题。

      【检索上下文】：
      {context}

      【回答策略——按问题类型自适应】
      1. 对比分析型问题：按比较对象分别论述，最后归纳异同，确保双方论据对称。
      2. 归因解释型问题：从现象出发，层层递进至底层机理，构建完整的因果链条。
      3. 结构归纳型问题：以分维度、分层次的框架化方式组织输出，确保要素覆盖完备。
      4. 跨文档推理型问题：整合多个独立文献的论证，进行跨文献综合推断。
      5. 全局总结型问题：以宏观视角呈现领域整体态势与演进特征。

      【核心约束】
      1. 必须基于上下文中的证据进行论述，严禁编造上下文中不存在的事实或文献。
      2. 关键论点须在句末标注引用序号，格式为 `[n]`，禁止使用其他复杂的引用标签（例如：“AIGC 显著提升了学习效果 [1]。”）。
      3. 使用Triples中的事实框架，并结合Chunks中的细节进行论证，确保回答具有学术深度。
      4. 若上下文证据不足以支撑完整回答，应明确指出“现有检索证据在某某方面尚不充分”，而非用模糊套话填充。
      5. 区分“上下文中的客观事实”与“基于证据的分析推断”，推断部分需标注综上所述。
      6. 回答应体现学术严谨性，论述有层次、有逻辑、有证据支撑。

      【用户问题】：
      {question}

      【回答】：

retrieval:
  agent:
    enable_ircot: false
    enable_parallel_subquestions: false
    max_steps: 1
  cache_dir: retriever/faiss_cache_new
  enable_caching: true
  enable_diagnostics: true
  enable_high_recall: true
  enable_query_enhancement: true
  enable_reranking: true
  faiss:
    device: cpu
    max_workers: 4
    search_k: 50
  recall_paths: 2
  similarity_threshold: 0.3
  top_k: 25
  top_k_filter: 25
  weak_relation_penalty: 0.2

triggers:
  constructor_trigger: true
  mode: agent  # set noagent to speed up
  retrieve_trigger: true
